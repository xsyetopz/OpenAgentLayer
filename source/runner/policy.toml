[command_policy]
parse_shell_chains = true
preserve_shell_semantics = true
destructive_commands_require_approval = true
package_manager_source = "repo files"

[package_managers]
detection_order = [
  "bun.lock",
  "pnpm-lock.yaml",
  "yarn.lock",
  "package-lock.json",
  "Cargo.lock",
  "go.mod",
]
never_coerce = true

[backends]
preferred = ["rtk", "oal-compact", "raw-budgeted"]
rtk_capability_source = "doctor probe"
unsupported_command = "raw-budgeted"

[token_accounting]
track_raw_tokens = true
track_kept_tokens = true
track_saved_tokens = true
track_unsupported_commands = true
track_low_yield_commands = true
