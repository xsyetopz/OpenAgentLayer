[package_managers]
preferred_order = ["bun", "pnpm", "yarn", "npm"]
selection = "repo-lockfile"
never_coerce = true

[[package_managers.install_commands]]
name = "bun"
command = ["bun", "install"]
lockfiles = ["bun.lock", "bun.lockb"]

[[package_managers.install_commands]]
name = "pnpm"
command = ["pnpm", "install"]
lockfiles = ["pnpm-lock.yaml"]

[[package_managers.install_commands]]
name = "yarn"
command = ["yarn", "install"]
lockfiles = ["yarn.lock"]

[[package_managers.install_commands]]
name = "npm"
command = ["npm", "install"]
lockfiles = ["package-lock.json", "npm-shrinkwrap.json"]

[capabilities]
rtk = ["rewrite", "filter-selection", "token-accounting", "recursion-guard"]
context7 = ["docs-lookup", "citations"]
caveman = ["mode-render", "protected-surface"]
