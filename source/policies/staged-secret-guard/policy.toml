id = "staged-secret-guard"
kind = "policy"
title = "Staged Secret Guard"
description = "Block staged or written secret-bearing content."
category = "vcs_gate"
severity = "error"
event_intent = "file_change"
hook_event_category = "file_change"
blocking = true
failure_mode = "fail_closed"
handler_class = "command_script"
runtime_script = "runtime/staged-secret-guard.mjs"
surface_events = ["PostToolUse", "tool.execute.after", "session.status"]
test_payloads = []
tests = ["staged-secret-guard.test.ts"]
surfaces = ["codex", "claude", "opencode"]

[surface_mappings]
codex = "PostToolUse"
claude = "PostToolUse"
opencode = "tool.execute.after"
