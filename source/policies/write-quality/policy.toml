id = "write-quality"
kind = "policy"
title = "Write Quality"
description = "Block placeholder output after writing or editing."
category = "output_safety"
severity = "error"
event_intent = "file_change"
hook_event_category = "post_tool"
blocking = true
failure_mode = "fail_closed"
handler_class = "command_script"
runtime_script = "runtime/write-quality.mjs"
surface_events = ["PostToolUse", "tool.execute.after"]
test_payloads = []
tests = ["write-quality.test.ts"]
surfaces = ["codex", "claude", "opencode"]

[surface_mappings]
codex = "PostToolUse"
claude = "PostToolUse"
opencode = "tool.execute.after"
