[[providers]]
name = "caveman"
url = "https://github.com/juliusbrussee/caveman"
required = true
sync_mode = "exact-upstream"

[providers.install]
default = "sync-only"
macos = []
linux = []
probe = []

[providers.provenance]
upstream_path = "providers/caveman/upstream"
overlay_path = "providers/caveman/overlay"
raw_upstream_editable = false
pin_required = true

[[providers]]
name = "rtk"
url = "https://github.com/rtk-ai/rtk"
required = true
sync_mode = "exact-upstream"

[providers.install]
default = "external-binary"
macos = ["brew install rtk-ai/tap/rtk"]
linux = [
    "curl -fsSL https://raw.githubusercontent.com/rtk-ai/rtk/master/install.sh | sh",
]
probe = ["rtk --version", "rtk gain", "rtk rewrite <command>"]

[providers.provenance]
upstream_path = "providers/rtk/upstream"
overlay_path = "providers/rtk/overlay"
raw_upstream_editable = false
pin_required = true

