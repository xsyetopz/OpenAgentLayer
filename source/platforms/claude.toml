name = "claude"

references = [
  "https://docs.claude.com/en/docs/claude-code/overview",
  "https://docs.claude.com/en/docs/claude-code/hooks",
  "https://docs.claude.com/en/docs/claude-code/sub-agents",
  "https://docs.claude.com/en/docs/agents-and-tools/agent-skills/overview",
]

[native_surfaces]
rules = "CLAUDE.md"
config = "settings.json"
agents = "Claude Code subagents"
skills = "Claude Code skills"
commands = "Claude Code slash commands"
hooks = "Claude Code hook events"
mcp = "Claude MCP config"

[adapter_plan]
primary = true
index_file = "CLAUDE.md"
requires_hook_support = true
generated_paths = ["CLAUDE.md", "settings.json", "skills", "agents", "hooks", "commands"]
install_paths = [
  "$CLAUDE_HOME/CLAUDE.md",
  "$CLAUDE_HOME/settings.json",
  "$CLAUDE_HOME/skills",
  "$CLAUDE_HOME/agents",
  "$CLAUDE_HOME/hooks",
  "$CLAUDE_HOME/commands",
]

[[hook_events]]
name = "pre-shell-guard"
native_event = "PreToolUse"
supported = true
payload = "tool call"
output = "allow or block"

[[hook_events]]
name = "pre-rtk-enforce"
native_event = "PreToolUse"
supported = true
payload = "shell command"
output = "rewritten command or block"

[[hook_events]]
name = "pre-input-check"
native_event = "PreToolUse"
supported = true
payload = "tool input"
output = "allow or block"

[[hook_events]]
name = "post-shell-redact"
native_event = "PostToolUse"
supported = true
payload = "tool output"
output = "redacted output"

[[hook_events]]
name = "post-write-check"
native_event = "PostToolUse"
supported = true
payload = "write or edit result"
output = "diagnostic hint"

[[hook_events]]
name = "post-failure-circuit"
native_event = "PostToolUseFailure"
supported = true
payload = "tool failure"
output = "failure state"

[[hook_events]]
name = "prompt-queue"
native_event = "UserPromptSubmit"
supported = true
payload = "prompt"
output = "prompt context"

[[hook_events]]
name = "prompt-git-context"
native_event = "UserPromptSubmit"
supported = true
payload = "prompt"
output = "repo context"

[[hook_events]]
name = "session-budget"
native_event = "SessionStart"
supported = true
payload = "session"
output = "budget context"

[[hook_events]]
name = "session-cleanup"
native_event = "SessionEnd"
supported = true
payload = "session"
output = "cleanup state"

[[hook_events]]
name = "stop-scan"
native_event = "Stop"
supported = true
payload = "final response"
output = "allow or block"

[[hook_events]]
name = "subagent-route"
native_event = "SubagentStart"
supported = true
payload = "subagent start"
output = "route context"

[[hook_events]]
name = "subagent-scan"
native_event = "SubagentStop"
supported = true
payload = "subagent result"
output = "allow or block"

[validation]
checks = [
  "settings parse",
  "command and skill render",
  "hook matrix",
  "temp-home install smoke",
]
