name = "codex"

references = [
  "https://developers.openai.com/codex/",
  "https://developers.openai.com/codex/config-reference",
  "https://developers.openai.com/codex/hooks",
  "https://developers.openai.com/codex/skills",
  "https://developers.openai.com/codex/subagents",
  "https://github.com/openai/codex",
]

[native_surfaces]
rules = "AGENTS.md"
config = "config.toml"
agents = "Codex subagents"
skills = "Codex skills"
commands = "Codex commands"
hooks = "Codex hook events"
mcp = "Codex MCP config"

[adapter_plan]
primary = true
index_file = "AGENTS.md"
requires_hook_support = true
generated_paths = ["AGENTS.md", "config.toml", "skills", "agents", "hooks", "commands"]
install_paths = [
  "$CODEX_HOME/AGENTS.md",
  "$CODEX_HOME/config.toml",
  "$CODEX_HOME/skills",
  "$CODEX_HOME/agents",
  "$CODEX_HOME/hooks",
  "$CODEX_HOME/commands",
]

[[hook_events]]
name = "pre-shell-guard"
native_event = "PreToolUse"
supported = true
payload = "tool call"
output = "allow or block"

[[hook_events]]
name = "pre-rtk-enforce"
native_event = "PreToolUse"
supported = true
payload = "shell command"
output = "rewritten command or block"

[[hook_events]]
name = "post-shell-redact"
native_event = "PostToolUse"
supported = true
payload = "tool output"
output = "redacted output"

[[hook_events]]
name = "prompt-queue"
native_event = "UserPromptSubmit"
supported = true
payload = "prompt"
output = "prompt context"

[[hook_events]]
name = "prompt-git-context"
native_event = "UserPromptSubmit"
supported = true
payload = "prompt"
output = "repo context"

[[hook_events]]
name = "session-budget"
native_event = "SessionStart"
supported = true
payload = "session"
output = "budget context"

[[hook_events]]
name = "stop-scan"
native_event = "Stop"
supported = true
payload = "final response"
output = "allow or block"

[validation]
checks = [
  "config parse",
  "command and skill render",
  "hook matrix",
  "temp-home install smoke",
]
