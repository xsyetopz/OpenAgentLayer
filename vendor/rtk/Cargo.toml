[package]
name = "rtk"
version = "0.37.2"
rust-version = "1.87.0"
edition = "2024"
authors = ["Patrick Szymkowiak"]
description = "Rust Token Killer - High-performance CLI proxy to minimize LLM token consumption"
license = "MIT"
homepage = "https://www.rtk-ai.app"
repository = "https://github.com/rtk-ai/rtk"
readme = "README.md"
keywords = ["cli", "llm", "token", "filter", "productivity"]
categories = ["command-line-utilities", "development-tools"]

[dependencies]
clap = { version = "4.6.1", features = ["derive"] }
anyhow = "1.0.102"
ignore = "0.4.25"
walkdir = "2.5.0"
regex = "1.12.3"
lazy_static = "1.5.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = { version = "1.0.149", features = ["preserve_order"] }
colored = "3.1.1"
dirs = "6.0.0"
rusqlite = { version = "0.39.0", features = ["bundled"] }
toml = "1.1.2"
chrono = "0.4.44"
tempfile = "3.27.0"
sha2 = "0.11.0"
ureq = "3.3.0"
getrandom = "0.4.2"
flate2 = "1.1.9"
quick-xml = "0.39.2"
which = "8.0.2"
automod = "1.0.16"

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[build-dependencies]
toml = "0.8.23"

[dev-dependencies]

[workspace]
members = ["."]

[lints]
workspace = true

[workspace.lints.rust]
dead_code = "warn" # RTK keeps some generated/optional filter paths unused per target
keyword_idents_2024 = "forbid"
missing_unsafe_on_extern = "forbid"
unsafe_code = "allow" # Unix signal handling currently uses libc
unsafe_op_in_unsafe_fn = "forbid"
unused_results = "warn" # CLI output writes and cleanup paths still need gradual hardening

[workspace.lints.clippy]
absolute_paths = "warn"
as_conversions = "warn" # RTK parses external counts; checked conversions will be tightened incrementally
as_pointer_underscore = "warn"
as_underscore = "warn"
cast_possible_truncation = "warn"
cast_possible_wrap = "warn"
cast_precision_loss = "warn"
cast_sign_loss = "warn"
clone_on_ref_ptr = "warn"
dbg_macro = "deny"
empty_drop = "warn"
exhaustive_structs = "allow"
exhaustive_enums = "allow"
filetype_is_file = "warn"
fn_to_numeric_cast_any = "warn"
get_unwrap = "warn"
infinite_loop = "warn"
let_underscore_must_use = "warn"
mem_forget = "warn"
missing_asserts_for_indexing = "warn"
module_name_repetitions = "allow"
multiple_crate_versions = "allow"
multiple_unsafe_ops_per_block = "warn"
mutex_atomic = "warn"
panic = "warn"
rc_buffer = "warn"
rc_mutex = "warn"
str_to_string = "warn"
string_slice = "warn"
struct_field_names = "allow"
tests_outside_test_module = "warn"
todo = "deny"
try_err = "warn"
unimplemented = "deny"
unnecessary_safety_comment = "warn"
unnecessary_safety_doc = "warn"
unreachable = "warn"
unwrap_in_result = "warn"
wildcard_imports = "allow"

cargo = { level = "warn", priority = -1 }
complexity = { level = "warn", priority = -1 }
correctness = { level = "deny", priority = -1 }
nursery = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
perf = { level = "warn", priority = -1 }
style = { level = "warn", priority = -1 }
suspicious = { level = "deny", priority = -1 }

[profile.dev]
debug = 1
incremental = false
codegen-units = 1

[profile.release]
opt-level = "s"
debug = "full"
strip = "symbols"
lto = true
panic = "abort"
incremental = true
codegen-units = 1

[profile.bench]
codegen-units = 16
lto = "thin"

# cargo-deb configuration
[package.metadata.deb]
maintainer = "Patrick Szymkowiak"
copyright = "2024 Patrick Szymkowiak"
license-file = ["LICENSE", "0"]
extended-description = "rtk filters and compresses command outputs before they reach your LLM context, saving 60-90% of tokens."
section = "utility"
priority = "optional"
assets = [
    ["target/release/rtk", "usr/bin/", "755"],
]
# cargo-generate-rpm configuration
[package.metadata.generate-rpm]
assets = [
    { source = "target/release/rtk", dest = "/usr/bin/rtk", mode = "755" },
]
