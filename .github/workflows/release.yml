name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24.14.1"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq shellcheck
      - name: Install root deps
        run: bun install --frozen-lockfile
      - name: Lint
        run: shellcheck install.sh config.sh build-plugin.sh uninstall.sh claude/hooks/scripts/_run.sh claude/statusline/statusline-command.sh opencode/install.sh
      - name: Check generated outputs
        run: bun run check:generated
      - name: Test
        run: bun test tests claude/tests codex/tests
      - name: Install smoke
        run: node scripts/ci/install-smoke.mjs
      - name: Install OpenCode deps
        working-directory: opencode
        run: bun install --frozen-lockfile
      - name: Test OpenCode
        working-directory: opencode
        run: bun test
      - name: Typecheck OpenCode
        working-directory: opencode
        run: bun run typecheck
      - name: Build plugin
        run: ./build-plugin.sh
      - name: Build generated assets bundle
        run: node scripts/build.mjs --out dist/openagentsbtw-generated-assets --platform all
      - name: Create release archive
        run: |
          cd dist
          tar -czf openagentsbtw-claude-plugin.tar.gz openagentsbtw-claude-plugin/
          tar -czf openagentsbtw-generated-assets.tar.gz openagentsbtw-generated-assets/
      - name: Validate release artifacts
        run: |
          test -f dist/openagentsbtw-claude-plugin.tar.gz
          test -f dist/openagentsbtw-generated-assets.tar.gz
          test -f dist/openagentsbtw-generated-assets/codex/templates/config.toml
          test -f dist/openagentsbtw-generated-assets/copilot/templates/.github/hooks/openagentsbtw.json
          test -f dist/openagentsbtw-generated-assets/opencode/templates/plugins/openagentsbtw.ts
      - name: Generate checksums
        run: |
          cd dist
          sha256sum openagentsbtw-claude-plugin.tar.gz openagentsbtw-generated-assets.tar.gz > SHA256SUMS.txt
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/openagentsbtw-claude-plugin.tar.gz
            dist/openagentsbtw-generated-assets.tar.gz
            dist/SHA256SUMS.txt
