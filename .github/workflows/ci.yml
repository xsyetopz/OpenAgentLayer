name: OAL CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: oal-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gates
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Verify upstream skill submodules
        run: |
          test -f third_party/caveman/skills/caveman/SKILL.md
          test -f third_party/taste-skill/skills/taste-skill/SKILL.md
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bunx tsc --noEmit
      - name: Test
        run: bun run test
      - name: Acceptance
        run: bun run accept
      - name: Lint
        run: bun run biome:check
      - name: Roadmap evidence
        run: bun run roadmap:evidence
      - name: Homebrew cask syntax
        run: ruby -c homebrew/Casks/openagentlayer.rb
  dry-run:
    name: Render and deploy dry-run
    runs-on: macos-15
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Verify upstream skill submodules
        run: |
          test -f third_party/caveman/skills/caveman/SKILL.md
          test -f third_party/taste-skill/skills/taste-skill/SKILL.md
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Source check
        run: bun run check
      - name: Preview generated artifacts
        run: bun run preview -- --provider all --path .codex/config.toml --content
      - name: Deploy dry-run
        run: |
          target="$(mktemp -d)"
          bun run deploy -- --target "$target" --scope project --provider all --dry-run

  homebrew-submission:
    name: Homebrew submission
    runs-on: macos-15
    needs: [quality, dry-run]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && github.repository == 'xsyetopz/OpenAgentLayer'
    env:
      HOMEBREW_TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY }}
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Verify upstream skill submodules
        run: |
          test -f third_party/caveman/skills/caveman/SKILL.md
          test -f third_party/taste-skill/skills/taste-skill/SKILL.md
      - name: Refuse fork deploy
        run: test "$GITHUB_REPOSITORY" = "xsyetopz/OpenAgentLayer"
      - name: Refuse non-master deploy
        run: test "$GITHUB_REF" = "refs/heads/master"
      - name: Verify cask before submission
        run: |
          ruby -c homebrew/Casks/openagentlayer.rb
          grep -q 'https://github.com/xsyetopz/OpenAgentLayer' homebrew/Casks/openagentlayer.rb
      - name: Submit cask to tap
        if: env.HOMEBREW_TAP_REPOSITORY != '' && env.HOMEBREW_TAP_TOKEN != ''
        run: |
          version="$(node -p "require('./package.json').version")"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${HOMEBREW_TAP_REPOSITORY}.git" tap
          mkdir -p tap/Casks
          cp homebrew/Casks/openagentlayer.rb tap/Casks/openagentlayer.rb
          cd tap
          git diff --check
          if git diff --exit-code -- Casks/openagentlayer.rb; then
            echo "Homebrew cask already current."
            exit 0
          fi
          git config user.name "openagentlayer-release"
          git config user.email "actions@github.com"
          git add Casks/openagentlayer.rb
          git commit -m "Update OpenAgentLayer cask to ${version}" -m "Co-authored-by: Codex <noreply@openai.com>"
          git push
      - name: Skip cask submission without tap credentials
        if: env.HOMEBREW_TAP_REPOSITORY == '' || env.HOMEBREW_TAP_TOKEN == ''
        run: echo "Homebrew tap credentials not configured; guarded deploy skipped."
