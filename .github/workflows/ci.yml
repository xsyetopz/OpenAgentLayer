name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  shellcheck:
    name: Shell Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: shellcheck install.sh config.sh build-plugin.sh uninstall.sh claude/hooks/scripts/_run.sh claude/statusline/statusline-command.sh opencode/install.sh

  jsonlint:
    name: JSON Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"
      - name: Validate JSON files
        run: |
          find . -name '*.json' -not -path './node_modules/*' -not -path './dist/*' | while read f; do
            bun -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" 2>&1 || { echo "Invalid JSON: $f"; exit 1; }
          done

  generated:
    name: Generated Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24.14.1"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"
      - name: Install root deps
        run: bun install --frozen-lockfile
      - name: Check generated outputs
        run: bun run check:generated

  hook-tests:
    name: Root Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24.14.1"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"
      - name: Install root deps
        run: bun install --frozen-lockfile
      - name: Run tests
        run: bun test tests claude/tests codex/tests

  opencode:
    name: OpenCode Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24.14.1"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"
      - name: Install OpenCode deps
        working-directory: opencode
        run: bun install --frozen-lockfile
      - name: Run OpenCode tests
        working-directory: opencode
        run: bun test
      - name: Run OpenCode typecheck
        working-directory: opencode
        run: bun run typecheck

  install-test:
    name: Install Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24.14.1"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"
      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
      - name: Validate script syntax
        run: |
          bash -n install.sh
          bash -n config.sh
          bash -n build-plugin.sh
          bash -n uninstall.sh
          bash -n opencode/install.sh
          echo "All scripts parse OK"
      - name: Validate plugin manifest
        run: |
          bun -e "const p = JSON.parse(require('fs').readFileSync('claude/.claude-plugin/plugin.json','utf8')); console.log('Claude plugin: ' + p.name + ' v' + p.version)"
      - name: Validate Codex plugin manifest
        run: |
          bun -e "const p = JSON.parse(require('fs').readFileSync('codex/plugin/openagentsbtw/.codex-plugin/plugin.json','utf8')); console.log('Codex plugin: ' + p.name + ' v' + p.version)"

  powershell-parse:
    name: PowerShell Wrapper Validation
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse PowerShell wrappers
        shell: pwsh
        run: |
          $files = @("install.ps1", "config.ps1", "uninstall.ps1", "build-plugin.ps1")
          foreach ($file in $files) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $file), [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error $_ }
              exit 1
            }
          }

  install-smoke-linux:
    name: Install Smoke (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24.14.1"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"
      - name: Install root deps
        run: bun install --frozen-lockfile
      - name: Install OpenCode deps
        working-directory: opencode
        run: bun install --frozen-lockfile
      - name: Run install/config/uninstall smoke
        run: node scripts/ci/install-smoke.mjs

  install-smoke-windows:
    name: Install Smoke (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24.14.1"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"
      - name: Install root deps
        run: bun install --frozen-lockfile
      - name: Install OpenCode deps
        working-directory: opencode
        run: bun install --frozen-lockfile
      - name: Run install/config/uninstall smoke
        run: node scripts/ci/install-smoke.mjs

  plugin-build:
    name: Claude Plugin Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24.14.1"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"
      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
      - name: Build plugin
        run: ./build-plugin.sh
      - name: Validate build output
        run: |
          test -d dist/openagentsbtw-claude-plugin
          test -f dist/openagentsbtw-claude-plugin/.claude-plugin/plugin.json
          bun -e "JSON.parse(require('fs').readFileSync('dist/openagentsbtw-claude-plugin/.claude-plugin/plugin.json','utf8'))"
          ! grep -r '__SHARED_CONSTRAINTS__' dist/openagentsbtw-claude-plugin/ || exit 1
          ! grep -r '__PACKAGE_CONSTRAINTS__' dist/openagentsbtw-claude-plugin/ || exit 1
          echo "Plugin build validated"
