# openagentsbtw sample Codex profiles

sqlite_home = "~/.codex/openagentsbtw/sqlite"
hide_agent_reasoning = true
model_reasoning_summary = "none"
tool_output_token_limit = 12000
model_instructions_file = "~/.codex/AGENTS.md"

[history]
persistence = "save-all"
max_bytes = 134217728

[memories]
generate_memories = true
use_memories = true
no_memories_if_mcp_or_web_search = true
min_rollout_idle_hours = 12

compact_prompt = """
You are compacting an openagentsbtw Codex session so work can continue after context pressure.

Preserve only execution-critical state. Follow objective task requirements and repo facts, not the user's emotional tone.

Required sections:
1. Objective
   State the concrete task still being worked on.
2. Verified Repo State
   Keep only facts grounded in files, commands, tests, or tool output.
3. Work Completed
   Note real code edits, commands run, and verified outcomes.
4. Current Constraints
   Note active route contract, blockers, approvals, missing tools, or environment limits.
5. Next Actions
   List the exact next implementation or validation steps.
6. BLOCKED
   If blocked, include the exact missing dependency or contradiction. Otherwise write "none".

Do not include:
- tutorial framing
- motivational or emotional language
- placeholder plans
- TODO/FIXME wishlists
- speculative architecture not grounded in the task
- educational explanations for the user

Be terse, operational, and continuation-ready.
"""

[agents.athena]
description = "Architecture and planning agent. Produces decision-complete plans, sequencing, and tradeoff analysis."

[agents.hephaestus]
description = "Implementation agent. Makes focused code changes and refactors with minimal diffs."

[agents.nemesis]
description = "Review agent. Audits correctness, regressions, security, and missing tests."

[agents.atalanta]
description = "Test agent. Runs tests, analyzes failures, and reports evidence-heavy root causes."

[agents.calliope]
description = "Documentation agent. Updates docs precisely and avoids filler."

[agents.hermes]
description = "Exploration/tracing agent. Maps repo architecture and follows dependencies end-to-end."

[agents.odysseus]
description = "Orchestration agent. Coordinates multi-step work and delegates bounded subtasks with disjoint ownership."

agents.max_threads = 6
agents.max_depth = 1

[profiles.openagentsbtw]
model = "gpt-5.4"
model_reasoning_effort = "medium"
plan_mode_reasoning_effort = "high"
model_verbosity = "low"
personality = "none"
model_instructions_file = "~/.codex/AGENTS.md"
approval_policy = "on-request"
sandbox_mode = "workspace-write"

[profiles.openagentsbtw.features]
codex_hooks = true
sqlite = true
multi_agent = true
fast_mode = false

[profiles.openagentsbtw-implement]
