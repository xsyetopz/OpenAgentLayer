#:schema https://developers.openai.com/codex/config-schema.json
# openagentsbtw managed file. Generated from source/ via scripts/generate.mjs
profile = "openagentsbtw"
sqlite_home = "~/.codex/openagentsbtw/sqlite"
project_doc_max_bytes = 16000
hide_agent_reasoning = true
model_reasoning_effort = "medium"
plan_mode_reasoning_effort = "high"
model_reasoning_summary = "none"
tool_output_token_limit = 2000
model_instructions_file = "~/.codex/AGENTS.md"
review_model = "gpt-5.3-codex"
approvals_reviewer = "auto_review"
allow_login_shell = true
web_search = "cached"
project_doc_fallback_filenames = ["CLAUDE.md"]
[tools]
view_image = true
[features]
codex_hooks = true
multi_agent_v2 = true
collaboration_modes = true
default_mode_request_user_input = true
fast_mode = false
memories = true
shell_tool = true
shell_snapshot = true
skill_mcp_dependency_install = true
unified_exec = false
[history]
persistence = "save-all"
max_bytes = 134217728
[memories]
generate_memories = true
use_memories = true
disable_on_external_context = true
min_rollout_idle_hours = 12
compact_prompt = """
You are compacting an openagentsbtw Codex session so work can continue after context pressure.

Preserve only execution-critical state. Follow objective task requirements and repo facts, not the user's emotional tone.

Required sections:
1. Objective
   State the concrete task still being worked on.
2. Verified Repo State
   Keep only facts grounded in files, commands, tests, or tool output.
3. Work Completed
   Note real code edits, commands run, and verified outcomes.
4. Current Constraints
   Note active route contract, blockers, approvals, missing tools, or environment limits.
5. Next Actions
   List the exact next implementation or validation steps.
6. BLOCKED
   If blocked, include the exact missing dependency or contradiction. Otherwise write "none".

Do not include:
- tutorial framing
- motivational or emotional language
- placeholder plans
- TODO/FIXME wishlists
- speculative architecture not grounded in the task
- educational explanations for the user

Be terse, operational, and continuation-ready.
"""
agents.max_threads = 5
agents.max_depth = 2
agents.job_max_runtime_seconds = 2700
[agents.athena]
description = "Architecture and planning agent for decision-complete plans, migrations, ownership boundaries, sequencing, and acceptance gates."
config_file = "agents/athena.toml"
nickname_candidates = ["Athena", "Architect", "Planner"]
[agents.hephaestus]
description = "Primary implementation agent for production code changes, bug fixes, refactors, and plan execution with verification."
config_file = "agents/hephaestus.toml"
nickname_candidates = ["Hephaestus", "Builder", "Implementer"]
[agents.nemesis]
description = "Review and audit agent for warranted correctness, regression, security, design-risk, and missing-test findings."
config_file = "agents/nemesis.toml"
nickname_candidates = ["Nemesis", "Reviewer", "Auditor"]
[agents.atalanta]
description = "Validation agent for tests, failure evidence, root-cause triage, and regression validation."
config_file = "agents/atalanta.toml"
nickname_candidates = ["Atalanta", "Tester", "Validator"]
[agents.calliope]
description = "Documentation agent for accurate READMEs, ADRs, changelogs, handoffs, and stale-doc cleanup."
config_file = "agents/calliope.toml"
nickname_candidates = ["Calliope", "Writer", "Documenter"]
[agents.hermes]
description = "Exploration agent for cited repo tracing, dependency analysis, API discovery, and narrow evidence packets."
config_file = "agents/hermes.toml"
nickname_candidates = ["Hermes", "Explorer", "Tracer"]
[agents.odysseus]
description = "Coordinator for packet-driven multi-step work, disjoint delegation, acceptance gates, and final synthesis."
config_file = "agents/odysseus.toml"
nickname_candidates = ["Odysseus", "Coordinator", "Orchestrator"]
