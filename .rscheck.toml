extends = []
scope = []
version = 3

[adapters.clippy]
args = ["--locked", "--", "-D", "warnings"]
enabled = true
toolchain = "inherit"

[engine]
nightly_toolchain = "nightly"
semantic = "auto"
toolchain = "stable"

[workspace]
exclude = ["target/**", ".git/**"]
include = ["crates/opendex/**/*.rs"]

[output]
format = "text"

[rules."architecture.qualified_module_paths"]
allow_crate_root_consts = true
allow_crate_root_fn_calls = true
allow_crate_root_macros = true
allow_prefixes = []
level = "deny"
roots = ["std", "core", "alloc", "crate", "opendex"]

[rules."architecture.banned_dependencies"]
banned_prefixes = ["std::process::exit"]
level = "deny"

[rules."architecture.layer_direction"]
level = "deny"
layers = [
  { name = "types", include = ["crates/opendex/src/types.rs"], may_depend_on = [] },
  { name = "store", include = ["crates/opendex/src/store.rs", "crates/opendex/src/persistence.rs"], may_depend_on = ["types"] },
  { name = "runtime", include = ["crates/opendex/src/runtime.rs", "crates/opendex/src/events.rs", "crates/opendex/src/guardrails.rs", "crates/opendex/src/error.rs", "crates/opendex/src/json.rs"], may_depend_on = ["types", "store"] },
  { name = "control-plane", include = ["crates/opendex/src/control_plane/**"], may_depend_on = ["types", "store", "runtime"] },
  { name = "daemon", include = ["crates/opendex/src/daemon.rs", "crates/opendex/src/lib.rs", "crates/opendex/src/main.rs"], may_depend_on = ["types", "store", "runtime", "control-plane"] },
]

[rules."design.god_object"]
level = "warn"

[rules."design.naming_policy"]
level = "warn"

[rules."design.public_api_errors"]
level = "allow"

[rules."design.repeated_type_aliases"]
level = "allow"

[rules."pattern.custom"]
level = "allow"

[rules."perf.hot_path_allocations"]
level = "warn"

[rules."portability.absolute_literal_paths"]
level = "warn"

[rules."shape.duplicate_logic"]
level = "warn"

[rules."shape.file_complexity"]
level = "warn"

[rules."shape.responsibility_split"]
level = "allow"

[rules."testing.external_test_modules"]
level = "warn"
